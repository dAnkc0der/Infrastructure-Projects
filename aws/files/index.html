<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Deployment Test</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #172033;
            background:
                linear-gradient(135deg, rgba(29, 78, 216, 0.16), rgba(16, 185, 129, 0.18)),
                #f7fafc;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(720px, 100%);
            background: #ffffff;
            border: 1px solid #d8e1ec;
            border-radius: 8px;
            padding: 42px;
            box-shadow: 0 18px 45px rgba(23, 32, 51, 0.14);
            text-align: center;
        }

        .badge {
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #dcfce7;
            color: #166534;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(32px, 6vw, 56px);
            line-height: 1.05;
        }

        p {
            margin: 10px 0;
            color: #526179;
            font-size: 18px;
            line-height: 1.55;
        }

        .version {
            margin-top: 28px;
            padding: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            color: #334155;
            font-family: "Courier New", monospace;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <main>
        <div class="badge">Pipeline Update Verified</div>
        <h1>CI/CD deployment is live</h1>
        <p>This page was updated through GitHub Actions, Ansible, and your EC2 web server.</p>
        <p>If this new design appears in the browser, your latest repo change reached production.</p>
        <div class="version">Test build: static-site-update-v2</div>
    </main>
</body>
</html>
