---
- name: Provision AWS EC2 Instance
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - aws/vars/main.yml
  tasks:
    - name: Launch EC2 Instance
      amazon.aws.ec2_instance:
        name: "Ansible-Test-Host"
        region: "{{ aws_region }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        security_groups:
          - "{{ security_group_id }}"
        state: present
        wait: true
        wait_timeout: 300
      register: ec2_instance

    - name: Save EC2 public IP
      ansible.builtin.set_fact:
        ec2_public_ip: "{{ ec2_instance.instances[0].public_ip_address }}"

    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ ec2_public_ip }}"
        port: 22
        delay: 10
        timeout: 300

    - name: Create dynamic inventory
      ansible.builtin.copy:
        dest: inventory.ini
        mode: "0644"
        content: |
          [hosts]
          {{ ec2_public_ip }} ansible_user=ec2-user

    - name: Show created host
      ansible.builtin.debug:
        msg: "EC2 instance is ready at {{ ec2_public_ip }}"
